worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Load Balancing Configurations
    
    # 1. Round Robin (Default)
    upstream backend_rr {
        server app1:8080;
        server app2:8080;
    }

    # 2. Weighted Round Robin
    upstream backend_wrr {
        server app1:8080 weight=3;
        server app2:8080 weight=1;
    }

    # 3. IP Hash
    upstream backend_iphash {
        ip_hash;
        server app1:8080;
        server app2:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Root for static files
        # We mount ./static to /usr/share/nginx/html/static
        # So we want / to serve from there
        root /usr/share/nginx/html/static;
        index index.html;

        # Static resources - Images
        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            root /usr/share/nginx/html/static;
            expires 30d;
        }
        
        # Specific location for /static/ path as requested
        # Use ^~ to prevent regex matching for this path
        location ^~ /static/ {
            alias /usr/share/nginx/html/static/;
            expires 7d;
        }

        # Static resources - CSS/JS
        location ~* \.(css|js)$ {
            # Assuming these are in the root of 'static' folder or accessed via relative paths
            root /usr/share/nginx/html/static;
            expires 7d;
        }

        # API Proxy
        location /api/ {
            # CHANGE THIS to switch load balancing algorithm:
            # backend_rr (Round Robin)
            # backend_wrr (Weighted Round Robin)
            # backend_iphash (IP Hash)
            proxy_pass http://backend_rr;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
