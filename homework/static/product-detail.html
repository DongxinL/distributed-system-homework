<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell fade-up">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark"></span>
                <div>
                    <h1 class="brand-title">商品详情</h1>
                    <p class="brand-subtitle">查看库存状态并直接发起秒杀请求</p>
                </div>
            </div>
            <div class="action-row">
                <a class="button-ghost" href="dashboard.html">返回商品页</a>
                <a class="button-secondary" href="orders.html">我的订单</a>
            </div>
        </header>

        <div class="detail-card" id="detailCard">
            <div class="detail-grid" id="detailGrid"></div>
        </div>

        <div class="empty-state hidden" id="detailError"></div>
    </div>

    <script src="app.js"></script>
    <script>
        (function () {
            const user = App.requireUser();
            if (!user) {
                return;
            }

            const detailGrid = document.getElementById('detailGrid');
            const detailError = document.getElementById('detailError');
            const detailCard = document.getElementById('detailCard');
            const productId = new URLSearchParams(window.location.search).get('id');

            if (!productId) {
                detailCard.classList.add('hidden');
                detailError.classList.remove('hidden');
                detailError.textContent = '缺少商品 ID 参数。';
                return;
            }

            loadProduct();

            async function loadProduct() {
                try {
                    const data = await App.request('/api/products/' + productId);
                    if (!data.success) {
                        throw new Error(data.message || '商品不存在');
                    }
                    renderProduct(data.data);
                } catch (error) {
                    detailCard.classList.add('hidden');
                    detailError.classList.remove('hidden');
                    detailError.textContent = '加载失败：' + error.message;
                }
            }

            function renderProduct(product) {
                const stockClass = product.stock > 0 ? 'success' : 'danger';
                const stockText = product.stock > 0 ? '库存充足：' + product.stock + ' 件' : '暂时缺货';
                const image = product.imageUrl
                    ? '<img src="' + product.imageUrl + '" alt="' + product.name + '">'
                    : '<span>暂无图片</span>';

                detailGrid.innerHTML = [
                    '<div class="detail-image">', image, '</div>',
                    '<div class="stack">',
                    '<span class="hero-badge">商品编号 #' + product.id + '</span>',
                    '<h2 class="hero-title" style="font-size: clamp(2rem, 4vw, 3rem); margin: 0;">' + product.name + '</h2>',
                    '<div class="detail-price">' + App.formatCurrency(product.price) + '</div>',
                    '<div class="status-pill ' + stockClass + '">' + stockText + '</div>',
                    '<div class="panel" style="padding: 18px;">',
                    '<h3 class="section-title">商品说明</h3>',
                    '<p class="section-intro">' + (product.description || '暂无描述') + '</p>',
                    '<div class="summary-grid">',
                    '<div class="stat-card"><div class="stat-label">创建时间</div><div class="stat-value" style="font-size: 1rem;">' + App.formatDate(product.createdAt) + '</div></div>',
                    '<div class="stat-card"><div class="stat-label">购买策略</div><div class="stat-value" style="font-size: 1rem;">Redis 预扣减</div></div>',
                    '</div>',
                    '</div>',
                    '<div class="action-row">',
                    '<button class="button-accent" type="button" id="buyNowButton" ' + (product.stock <= 0 ? 'disabled' : '') + '>立即秒杀</button>',
                    '<button class="button-ghost" type="button" id="reloadButton">刷新库存</button>',
                    '</div>',
                    '</div>'
                ].join('');

                document.getElementById('reloadButton').addEventListener('click', function () {
                    window.location.reload();
                });

                const buyNowButton = document.getElementById('buyNowButton');
                if (buyNowButton) {
                    buyNowButton.addEventListener('click', function () {
                        buy(product.id, buyNowButton);
                    });
                }
            }

            async function buy(id, button) {
                App.setButtonLoading(button, true, '抢购中...', '立即秒杀');
                try {
                    const body = new URLSearchParams({ userId: user.id, productId: id, quantity: 1 });
                    const data = await App.request('/api/orders/flash-sale', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: body.toString()
                    });
                    if (data.success) {
                        App.showToast(data.message, 'success');
                        window.setTimeout(function () {
                            loadProduct();
                        }, 1200);
                    } else {
                        App.showToast(data.message || '抢购失败', 'error');
                    }
                } catch (error) {
                    App.showToast('抢购失败：' + error.message, 'error');
                } finally {
                    App.setButtonLoading(button, false, '抢购中...', '立即秒杀');
                }
            }
        })();
    </script>
</body>
</html>
