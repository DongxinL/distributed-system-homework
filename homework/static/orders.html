<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell fade-up">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark"></span>
                <div>
                    <h1 class="brand-title">我的订单</h1>
                    <p class="brand-subtitle">查看支付状态、发起支付或取消订单</p>
                </div>
            </div>
            <div class="action-row">
                <a class="button-ghost" href="dashboard.html">返回商品页</a>
                <button class="button-secondary" type="button" id="refreshOrdersButton">刷新订单</button>
            </div>
        </header>

        <section class="hero-panel">
            <div>
                <span class="hero-badge" id="orderUserBadge">当前用户</span>
                <h2 class="hero-title">订单流转与支付一致性</h2>
                <p class="hero-text">待支付订单会通过 Kafka 异步触发支付处理，支付完成后订单状态会更新为已支付；取消订单会回滚数据库库存。</p>
            </div>
            <div class="summary-grid" id="orderSummaryCards"></div>
        </section>

        <section class="panel">
            <div class="panel-header compact">
                <div>
                    <h3 class="section-title">订单列表</h3>
                    <p class="section-intro">支持支付、取消和状态刷新。</p>
                </div>
            </div>
            <div class="stack" id="orderList"></div>
            <div class="empty-state hidden" id="emptyOrders">当前还没有订单，先去商品页发起一次秒杀。</div>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        (function () {
            const user = App.requireUser();
            if (!user) {
                return;
            }

            const orderUserBadge = document.getElementById('orderUserBadge');
            const orderSummaryCards = document.getElementById('orderSummaryCards');
            const orderList = document.getElementById('orderList');
            const emptyOrders = document.getElementById('emptyOrders');

            orderUserBadge.textContent = '当前用户：' + user.username;
            document.getElementById('refreshOrdersButton').addEventListener('click', loadOrders);

            loadOrders();

            async function loadOrders() {
                try {
                    const data = await App.request('/api/orders/user?userId=' + encodeURIComponent(user.id));
                    renderOrders(data.data || []);
                } catch (error) {
                    App.showToast('加载订单失败：' + error.message, 'error');
                }
            }

            function renderOrders(orders) {
                const summary = {
                    total: orders.length,
                    created: orders.filter(function (item) { return item.status === 'CREATED'; }).length,
                    paid: orders.filter(function (item) { return item.status === 'PAID'; }).length
                };

                orderSummaryCards.innerHTML = [
                    { label: '订单总数', value: String(summary.total) },
                    { label: '待支付', value: String(summary.created) },
                    { label: '已支付', value: String(summary.paid) }
                ].map(function (item) {
                    return '<div class="stat-card"><div class="stat-label">' + item.label + '</div><div class="stat-value">' + item.value + '</div></div>';
                }).join('');

                if (!orders.length) {
                    orderList.innerHTML = '';
                    emptyOrders.classList.remove('hidden');
                    return;
                }

                emptyOrders.classList.add('hidden');
                orderList.innerHTML = orders.map(function (order) {
                    const canPay = order.status === 'CREATED';
                    const canCancel = order.status === 'CREATED' || order.status === 'PAYMENT_FAILED';
                    return [
                        '<article class="order-card">',
                        '<div class="order-header">',
                        '<div><strong>订单 #', order.id, '</strong><div class="muted">创建时间：', App.formatDate(order.createdAt), '</div></div>',
                        '<span class="status-badge status-', order.status, '">', statusText(order.status), '</span>',
                        '</div>',
                        '<div class="order-body">',
                        '<div class="stack" style="gap: 6px; min-width: 220px;">',
                        '<div><strong>商品 ID：</strong>', order.productId, '</div>',
                        '<div class="muted">数量：', order.quantity, '</div>',
                        '</div>',
                        '<div class="order-price">', App.formatCurrency(order.totalPrice), '</div>',
                        '<div class="action-row">',
                        (canPay ? '<button class="button" type="button" data-pay-id="' + order.id + '">发起支付</button>' : ''),
                        (canCancel ? '<button class="button-danger" type="button" data-cancel-id="' + order.id + '">取消订单</button>' : ''),
                        '</div>',
                        '</div>',
                        '</article>'
                    ].join('');
                }).join('');

                orderList.querySelectorAll('[data-pay-id]').forEach(function (button) {
                    button.addEventListener('click', function () {
                        payOrder(button.dataset.payId, button);
                    });
                });

                orderList.querySelectorAll('[data-cancel-id]').forEach(function (button) {
                    button.addEventListener('click', function () {
                        cancelOrder(button.dataset.cancelId);
                    });
                });
            }

            function statusText(status) {
                const statusMap = {
                    CREATED: '待支付',
                    PAID: '已支付',
                    PAYMENT_FAILED: '支付失败',
                    CANCELLED: '已取消'
                };
                return statusMap[status] || status;
            }

            async function payOrder(orderId, button) {
                App.setButtonLoading(button, true, '支付中...', '发起支付');
                try {
                    const body = new URLSearchParams({ orderId: orderId, userId: user.id });
                    const data = await App.request('/api/orders/pay', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: body.toString()
                    });
                    App.showToast(data.message || '支付请求已提交', data.success ? 'success' : 'error');
                    window.setTimeout(loadOrders, 1500);
                } catch (error) {
                    App.showToast('支付失败：' + error.message, 'error');
                } finally {
                    App.setButtonLoading(button, false, '支付中...', '发起支付');
                }
            }

            async function cancelOrder(orderId) {
                if (!window.confirm('确认取消该订单吗？')) {
                    return;
                }
                try {
                    const body = new URLSearchParams({ orderId: orderId, userId: user.id });
                    const data = await App.request('/api/orders/cancel', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: body.toString()
                    });
                    App.showToast(data.message || '订单已取消', data.success ? 'success' : 'error');
                    loadOrders();
                } catch (error) {
                    App.showToast('取消失败：' + error.message, 'error');
                }
            }
        })();
    </script>
</body>
</html>
