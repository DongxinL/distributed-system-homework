<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 分布式系统作业</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            text-align: center;
        }
        .tab.active {
            border-bottom: 2px solid #007bff;
            font-weight: bold;
        }
        .message-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .message-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="auth-container">
            <div class="tabs">
                <div class="tab" :class="{ active: isLogin }" @click="isLogin = true">登录</div>
                <div class="tab" :class="{ active: !isLogin }" @click="isLogin = false">注册</div>
            </div>
            
            <div v-if="isLogin">
                <h2>系统登录</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" v-model="loginForm.username" placeholder="请输入用户名" @keyup.enter="handleLogin">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" v-model="loginForm.password" placeholder="请输入密码" @keyup.enter="handleLogin">
                </div>
                <button @click="handleLogin" :disabled="loading">
                    {{ loading ? '登录中...' : '登录' }}
                </button>
            </div>

            <div v-else>
                <h2>账号注册</h2>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" v-model="regForm.username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" v-model="regForm.email" placeholder="请输入邮箱地址">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" v-model="regForm.password" placeholder="请输入密码">
                </div>
                <button @click="handleRegister" :disabled="loading">
                    {{ loading ? '注册中...' : '注册' }}
                </button>
            </div>
            
            <div v-if="message.text" class="message-box" :class="message.isError ? 'message-error' : 'message-success'">
                {{ message.text }}
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue

        createApp({
            setup() {
                const isLogin = ref(true)
                const loading = ref(false)
                const message = reactive({ text: '', isError: false })
                
                const loginForm = reactive({ username: '', password: '' })
                const regForm = reactive({ username: '', email: '', password: '' })

                const showMessage = (text, isError = false) => {
                    message.text = text
                    message.isError = isError
                    if(!isError && !text.includes('跳转')) {
                        setTimeout(() => message.text = '', 3000)
                    }
                }

                const handleLogin = async () => {
                    if(!loginForm.username || !loginForm.password) {
                        showMessage('请输入用户名和密码', true)
                        return
                    }
                    loading.value = true
                    try {
                        const res = await fetch('/api/users/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(loginForm)
                        })
                        const data = await res.json()
                        if (data.success) {
                            showMessage('登录成功！正在跳转...', false)
                            localStorage.setItem('user', JSON.stringify(data.user))
                            setTimeout(() => window.location.href = 'dashboard.html', 1000)
                        } else {
                            showMessage(data.message || '用户名或密码错误', true)
                        }
                    } catch (e) {
                        showMessage('网络错误: ' + e.message, true)
                    } finally {
                        loading.value = false
                    }
                }

                const handleRegister = async () => {
                    if(!regForm.username || !regForm.password) {
                        showMessage('请输入用户名和密码', true)
                        return
                    }
                    loading.value = true
                    try {
                        const res = await fetch('/api/users/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(regForm)
                        })
                        const data = await res.json()
                        if (data.success) {
                            showMessage('注册成功！请登录。', false)
                            isLogin.value = true // switch to login
                            loginForm.username = regForm.username
                        } else {
                            showMessage(data.message || '注册失败', true)
                        }
                    } catch (e) {
                        showMessage('网络错误: ' + e.message, true)
                    } finally {
                        loading.value = false
                    }
                }

                return {
                    isLogin,
                    loading,
                    message,
                    loginForm,
                    regForm,
                    handleLogin,
                    handleRegister
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
