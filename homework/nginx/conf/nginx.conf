worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream gateway_backend {
        server gateway:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Root for static files
        # We mount ./static to /usr/share/nginx/html/static
        # So we want / to serve from there
        root /usr/share/nginx/html/static;
        index index.html;

        # Static resources - Images
        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            root /usr/share/nginx/html/static;
            expires 30d;
        }
        
        # Specific location for /static/ path as requested
        # Use ^~ to prevent regex matching for this path
        location ^~ /static/ {
            alias /usr/share/nginx/html/static/;
            expires 7d;
        }

        # Static resources - CSS/JS
        location ~* \.(css|js)$ {
            # Assuming these are in the root of 'static' folder or accessed via relative paths
            root /usr/share/nginx/html/static;
            expires 7d;
        }

        location /api/ {
            proxy_pass http://gateway_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /lab/ {
            proxy_pass http://gateway_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /gateway/ {
            proxy_pass http://gateway_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /flash-sale-service/ {
            proxy_pass http://gateway_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /actuator/ {
            proxy_pass http://gateway_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
