server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:flash-sale-service}
  config:
    import: optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        group: DEFAULT_GROUP
        metadata:
          instanceName: ${INSTANCE_NAME:${HOSTNAME:flash-sale-instance}}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
        import-check:
          enabled: false
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/test_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
          username: ${SPRING_DATASOURCE_USERNAME:user}
          password: ${SPRING_DATASOURCE_PASSWORD:password}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          url: ${SPRING_DATASOURCE_SLAVE_URL:jdbc:mysql://localhost:3308/test_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
          username: ${SPRING_DATASOURCE_SLAVE_USERNAME:user}
          password: ${SPRING_DATASOURCE_SLAVE_PASSWORD:password}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: flash-sale-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always

info:
  app:
    name: ${spring.application.name}
    description: flash-sale service with nacos governance demo

homework:
  governance:
    banner: 本地默认治理配置已生效
    tip: 请在 Nacos 控制台修改 flash-sale-service.yaml 验证动态刷新
    unstable-delay-ms: 2500
    fallback-message: 服务已降级，返回本地兜底结果
